# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Claude"

ai_usage_summary: |
  Claude (Anthropic) was used throughout development: to design and write the
  candidate ranking script (rank.py), debug deployment issues on the
  HuggingFace Spaces demo, build the Gradio web interface (app.py), and
  prepare the presentation. No candidate data was sent to any external API
  during the actual ranking process — all scoring runs locally and offline.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A weighted 5-signal scorer (skills 35%, career history 25%, experience 15%,
  behavioral signals 15%, location 10%). The key defense against keyword
  stuffing: each skill match is weighted by a trust multiplier derived from
  endorsements and duration_months, so a buzzword listed last month with
  zero endorsements counts far less than a skill held for years with real
  endorsements. Career scoring checks both current title and full career
  history, so a single trendy current title isn't enough on its own. This
  was explicitly validated against a planted honeypot candidate (an "AI
  enthusiast" with a non-technical career history and 9+ self-listed AI
  buzzwords but near-zero endorsement/duration depth) - the fix dropped
  this candidate, and all other off-domain titles, out of the top 100
  entirely. Runs fully offline on CPU in under a minute for 100K candidates.

